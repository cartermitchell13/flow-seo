<html>
<head>
    <title>Authentication Complete</title>
</head>
<body>
    <p>Authentication successful! You can now close this window.</p>
    <script>
        // Check if the window was opened by another window (e.g., the main app)
        if (window.opener) {
            // Get the origin from the environment
            const targetOrigin = window.location.hostname === 'localhost' 
                ? 'http://localhost:1337'
                : 'https://webflow.com';

            // Notify the parent window that authentication is complete
            window.opener.postMessage('authComplete', targetOrigin);
            
            // Close this window after sending the message
            window.close();
        }
    </script>
</body>
</html>
